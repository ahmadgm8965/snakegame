<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Snake - Pro Edition</title>
    <style>
        /* Modern & Social Media Friendly Styling */
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #00ffcc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0; overflow: hidden;
        }
        h1 { text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; font-size: 2.5rem; }
        .stats-container {
            display: flex; gap: 30px; font-size: 1.2rem; font-weight: bold;
            background: rgba(255, 255, 255, 0.1); padding: 10px 25px;
            border-radius: 50px; margin-bottom: 15px; border: 1px solid #00ffcc;
        }
        #game-box { position: relative; }
        canvas {
            background-color: #000; border: 4px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3); border-radius: 10px;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 400px; height: 400px;
            background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 10px;
        }
        button {
            padding: 12px 30px; font-size: 1.5rem; cursor: pointer;
            background: #00ffcc; color: #000; border: none; border-radius: 5px;
            font-weight: bold; transition: 0.3s; box-shadow: 0 0 15px #00ffcc;
        }
        button:hover { transform: scale(1.1); background: #fff; }
        .instructions { margin-top: 15px; color: #aaa; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>CYBER SNAKE</h1>

    <div class="stats-container">
        <div>Score: <span id="score">0</span></div>
        <div>Level: <span id="level">1</span></div>
        <div>Record: <span id="highScore">0</span></div>
    </div>

    <div id="game-box">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay">
            <button id="start-btn">START MISSION</button>
            <p style="color: white; margin-top: 10px;" id="status-text"></p>
        </div>
    </div>

    <p class="instructions">Use Arrow Keys or WASD to Control</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highscoreElement = document.getElementById("highScore");
        const levelElement = document.getElementById("level");
        const overlay = document.getElementById("overlay");
        const startBtn = document.getElementById("start-btn");
        const statusText = document.getElementById("status-text");

        let score, highScore, level, gameSpeed, dx, dy, snake, foodX, foodY, gameRunning;

        highScore = localStorage.getItem("cyberSnakeHigh") || 0;
        highscoreElement.innerText = highScore;

        function init() {
            score = 0; level = 1; gameSpeed = 120;
            dx = 20; dy = 0;
            snake = [{x: 160, y: 200}, {x: 140, y: 200}, {x: 120, y: 200}];
            scoreElement.innerText = score;
            levelElement.innerText = level;
            createFood();
        }

        startBtn.onclick = () => {
            overlay.style.display = "none";
            gameRunning = true;
            init();
            main();
        };

        window.addEventListener("keydown", (e) => {
            const key = e.keyCode;
            if ((key === 37 || key === 65) && dx === 0) { dx = -20; dy = 0; }
            if ((key === 38 || key === 87) && dy === 0) { dx = 0; dy = -20; }
            if ((key === 39 || key === 68) && dx === 0) { dx = 20; dy = 0; }
            if ((key === 40 || key === 83) && dy === 0) { dx = 0; dy = 20; }
        });

        function main() {
            if (!gameRunning) return;

            if (didGameEnd()) {
                endGame();
                return;
            }

            setTimeout(() => {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Optional Grid effect
            ctx.strokeStyle = "#111";
            for(let i=0; i<400; i+=20) {
                ctx.strokeRect(i, 0, 1, 400);
                ctx.strokeRect(0, i, 400, 1);
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#00ffcc" : "#008877";
                ctx.shadowBlur = (index === 0) ? 15 : 0;
                ctx.shadowColor = "#00ffcc";
                ctx.fillRect(part.x, part.y, 18, 18);
            });
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                if(score % 50 === 0) {
                    level++;
                    levelElement.innerText = level;
                    gameSpeed = Math.max(50, gameSpeed - 10); // Speed up
                }
                createFood();
            } else {
                snake.pop();
            }
        }

        function createFood() {
            foodX = Math.floor(Math.random() * 20) * 20;
            foodY = Math.floor(Math.random() * 20) * 20;
        }

        function drawFood() {
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc(foodX + 10, foodY + 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= 400 || snake[0].y < 0 || snake[0].y >= 400;
        }

        function endGame() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("cyberSnakeHigh", highScore);
                highscoreElement.innerText = highScore;
                statusText.innerText = "NEW RECORD! 🎉";
            } else {
                statusText.innerText = "GAME OVER";
            }
            startBtn.innerText = "RETRY";
            overlay.style.display = "flex";
        }
    </script>
</body>
</html>
