<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Snake - Mobile Friendly</title>
    <style>
        body { background: #0f0c29; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        canvas { background: #000; border: 3px solid #00ffcc; max-width: 90vw; max-height: 45vh; border-radius: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn { width: 60px; height: 60px; background: rgba(0, 255, 204, 0.1); border: 2px solid #00ffcc; color: #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        .btn:active { background: #00ffcc; color: #000; }
        #start-btn { padding: 12px 25px; background: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div style="margin-bottom: 10px;">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <div></div><div class="btn" onclick="setDir(0, -20)">▲</div><div></div>
        <div class="btn" onclick="setDir(-20, 0)">◀</div>
        <div class="btn" onclick="setDir(0, 20)">▼</div>
        <div class="btn" onclick="setDir(20, 0)">▶</div>
    </div>
    <button id="start-btn" onclick="startGame()" style="margin-top: 15px;">START GAME</button>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0, dx = 20, dy = 0, snake, gameRunning = false;
        function startGame() { score = 0; dx = 20; dy = 0; gameRunning = true; snake = [{x: 160, y: 200}, {x: 140, y: 200}, {x: 120, y: 200}]; document.getElementById("score").innerText = score; main(); }
        function setDir(x, y) { if ((x === -dx) || (y === -dy)) return; dx = x; dy = y; }
        function main() {
            if (!gameRunning) return;
            if (snake[0].x < 0 || snake[0].x >= 400 || snake[0].y < 0 || snake[0].y >= 400) { alert("Game Over!"); gameRunning = false; return; }
            setTimeout(() => {
                ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                snake.unshift(head); snake.pop();
                ctx.fillStyle = "#00ffcc"; snake.forEach(p => ctx.fillRect(p.x, p.y, 18, 18));
                main();
            }, 150);
        }
    </script>
</body>
</html>
